services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Intentionally no `ports:` — only reachable by other containers on this compose network.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      PORT: 4000
      CORS_ORIGIN: https://${DOMAIN}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_ADMIN_FULLNAME: ${SEED_ADMIN_FULLNAME:-Administrator}
      SEED_SUPERADMIN_USERNAME: ${SEED_SUPERADMIN_USERNAME:-}
      SEED_SUPERADMIN_PASSWORD: ${SEED_SUPERADMIN_PASSWORD:-}
      SEED_SUPERADMIN_FULLNAME: ${SEED_SUPERADMIN_FULLNAME:-Super Admin}
      DADATA_API_KEY: ${DADATA_API_KEY:-}
    volumes:
      - uploads_data:/app/uploads
    # Intentionally no `ports:` — only the frontend/nginx container talks to the API.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro

  # Idle on purpose — it used to run its own `certbot renew` loop, but that
  # loop had no way to reload nginx afterward (no Docker CLI/socket inside
  # this container to reach the frontend service), so a successful renewal
  # left nginx still serving the old, soon-to-expire certificate from
  # memory until the next full restart. Renewal is now a host-side job
  # (scripts/renew-certificates.sh, run via cron/systemd) that can run both
  # `certbot renew` *and* the nginx reload. This service stays around so
  # deploy/init-letsencrypt.sh and scripts/renew-certificates.sh have a
  # container to `run`/`exec` certbot commands against.
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 1d & wait $$!; done;'"
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot

volumes:
  db_data:
  certbot_certs:
  certbot_webroot:
  uploads_data:
